# DigiPrezence SPA — Nginx catch-all for client-side routing
# Place this file in /etc/nginx/sites-available/ on the Hostinger VPS
# Then symlink: ln -s /etc/nginx/sites-available/digiprezence /etc/nginx/sites-enabled/
# And reload: nginx -s reload

server {
    listen 80;
    listen [::]:80;
    server_name digiprezence.com www.digiprezence.com;

    root /var/www/digiprezence;
    index index.html;

    # gzip
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets with long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA catch-all — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
